<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPG 作業日報アプリ（連打防止版）</title>
    <style>
        body { font-family: 'Meiryo', sans-serif; margin: 0; padding: 12px; background-color: #f4f7f6; color: #333; }
        .card { background: #fff; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 12px; }
        h2 { margin-top: 0; color: #0056b3; font-size: 16px; border-bottom: 2px solid #0056b3; padding-bottom: 5px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-top: 10px; margin-bottom: 4px; color: #495057; }
        .btn { display: block; width: 100%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; text-align: center; cursor: pointer; box-sizing: border-box; }
        .btn:active { background: #004085; }
        .btn-start { background: #28a745; }
        .btn-start:active { background: #1e7e34; }
        .btn-end { background: #dc3545; }
        .btn-end:active { background: #bd2130; }
        .btn:disabled { background: #6c757d !important; opacity: 0.6; cursor: not-allowed; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background: #fff; }
        input[readonly] { background: #e9ecef; color: #495057; font-weight: bold; }
        #camera-preview { width: 100%; max-height: 220px; background: #000; border-radius: 6px; overflow: hidden; margin-bottom: 10px; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .flex-container { display: flex; gap: 10px; margin-top: 10px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 10000; display: none; text-align: center; width: 80%; max-width: 300px; }
        .toast.show { display: block; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📷 指図書バーコードスキャン</h2>
        <div id="camera-preview">
            <video id="video" autoplay playsinline></video>
        </div>
        <button class="btn" id="scan-btn" onclick="startCamera()">カメラを起動してスキャン</button>
    </div>

    <div class="card">
        <h2>📝 実績入力</h2>
        
        <label>読込データ (発注No):</label>
        <input type="text" id="order-input" readonly placeholder="指図書をスキャンしてください">
        
        <label>生産ライン場所:</label>
        <select id="line-select">
            <option value="第1ライン">第1ライン</option>
            <option value="第2ライン">第2ライン</option>
            <option value="第3ライン">第3ライン</option>
            <option value="梱包ライン">梱包ライン</option>
        </select>
        
        <label>作業人数 (名):</label>
        <input type="number" id="workers-input" value="1" min="1">
        
        <div class="flex-container">
            <button class="btn btn-start" id="start-btn" onclick="sendNippo('開始')" disabled>▶ 作業開始</button>
            <button class="btn btn-end" id="end-btn" onclick="sendNippo('終了')" disabled>■ 作業終了</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyVDbSrBdLA63F-pb07u4hkhA8diEVpiWklF2jme7KsLaUALxgW7TiYDMnof2WY7ZTYxQ/exec";
        
        let codeReader = null;
        let selectedDeviceId = null;
        let currentStatus = "未開始";

        window.addEventListener('load', () => {
            codeReader = new ZXing.BrowserMultiFormatReader();
        });

        function startCamera() {
            const preview = document.getElementById('camera-preview');
            preview.style.display = 'block';
            codeReader.listVideoInputDevices()
                .then((videoInputDevices) => {
                    selectedDeviceId = videoInputDevices[0].deviceId;
                    if (videoInputDevices.length > 1) {
                        for(let device of videoInputDevices){
                            if(device.label.toLowerCase().includes('back') || device.label.toLowerCase().includes('environment')){
                                selectedDeviceId = device.deviceId;
                                break;
                            }
                        }
                    }
                    showToast("カメラ起動中...");
                    codeReader.decodeFromVideoDevice(selectedDeviceId, 'video', (result, err) => {
                        if (result) {
                            const scannedText = result.text.trim();
                            const cleanOrderNo = (scannedText.endsWith("00") || scannedText.endsWith("01")) ? scannedText.slice(0, -2) : scannedText;
                            
                            document.getElementById('order-input').value = cleanOrderNo;
                            showToast("✔ 指図書読込: " + cleanOrderNo);
                            
                            currentStatus = "未開始";
                            updateButtonStates();
                            stopCamera();
                        }
                    });
                }).catch(err =>
