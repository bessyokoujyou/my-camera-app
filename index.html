<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPG 作業日報アプリ</title>
    <style>
        body { font-family: 'Meiryo', sans-serif; margin: 0; padding: 15px; background-color: #f4f7f6; color: #333; }
        .card { background: #fff; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { margin-top: 0; color: #0056b3; font-size: 18px; border-bottom: 2px solid #0056b3; padding-bottom: 5px; }
        .btn { display: block; width: 100%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; text-align: center; cursor: pointer; text-decoration: none; box-sizing: border-box; }
        .btn:active { background: #004085; }
        .btn-success { background: #28a745; }
        .btn-success:active { background: #1e7e34; }
        input[type="text"] { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px; }
        #camera-preview { width: 100%; max-height: 250px; background: #000; border-radius: 6px; overflow: hidden; margin-bottom: 15px; display: none; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 10000; display: none; }
        .toast.show { display: block; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📷 バーコードスキャン</h2>
        <div id="camera-preview">
            <video id="video" autoplay playsinline></video>
        </div>
        <button class="btn" id="scan-btn" onclick="startCamera()">カメラを起動してスキャン</button>
    </div>

    <div class="card">
        <h2>📝 入力データ確認</h2>
        <label>読み取り値 (発注No / ロット):</label>
        <input type="text" id="barcode-input" placeholder="スキャンするか直接入力">
        
        <label>現在選択中の発注No:</label>
        <input type="text" id="order-input" readonly placeholder="自動抽出されます">
        
        <button class="btn btn-success" style="margin-top: 10px;" onclick="sendNippo()">この内容で日報を保存</button>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
    <script>
        // ★最重要★ 設定したGASのWebアプリURL（デプロイして発行された最新のもの）
        const API_URL = "https://script.google.com/macros/s/AKfycbyVDbSrBdLA63F-pb07u4hkhA8diEVpiWklF2jme7KsLaUALxgW7TiYDMnof2WY7ZTYxQ/exec";
        
        let codeReader = null;
        let selectedDeviceId = null;

        window.addEventListener('load', () => {
            codeReader = new ZXing.BrowserMultiFormatReader();
        });

        // スマホのカメラを呼び出してアクセス制限をクリアする関数
        function startCamera() {
            const preview = document.getElementById('camera-preview');
            preview.style.display = 'block';
            
            codeReader.listVideoInputDevices()
                .then((videoInputDevices) => {
                    // 背面カメラ（背面レンズ）を優先的に選択するロジック
                    selectedDeviceId = videoInputDevices[0].deviceId;
                    if (videoInputDevices.length > 1) {
                        for(let device of videoInputDevices){
                            if(device.label.toLowerCase().includes('back') || device.label.toLowerCase().includes('environment')){
                                selectedDeviceId = device.deviceId;
                                break;
                            }
                        }
                    }
                    
                    showToast("カメラを起動しています...");
                    decodeContinuously(selectedDeviceId);
                })
                .catch((err) => {
                    console.error(err);
                    showToast("❌ カメラの起動に失敗しました。ブラウザのアクセス権限を確認してください。");
                });
        }

        function decodeContinuously(deviceId) {
            codeReader.decodeFromVideoDevice(deviceId, 'video', (result, err) => {
                if (result) {
                    const scannedText = result.text;
                    document.getElementById('barcode-input').value = scannedText;
                    showToast("✔ スキャン成功: " + scannedText);
                    
                    // バーコードルールの自動処理
                    processBarcodeRule(scannedText);
                    
                    // スキャンが成功したらカメラを止めてプレビューを閉じる
                    stopCamera();
                }
                if (err && !(err instanceof ZXing.NotFoundException)) {
                    console.error(err);
                }
            });
        }

        function stopCamera() {
            codeReader.reset();
            document.getElementById('camera-preview').style.display = 'none';
        }

        // バーコードの読み取り文字から挙動を自動判別
        function processBarcodeRule(text) {
            if (text.startsWith("L")) {
                showToast("ロット番号を認識しました");
            } else {
                // 末尾が00または01の場合、それを除いた前段部分を発注Noとして仮登録
                if (text.endsWith("00") || text.endsWith("01")) {
                    const orderNo = text.slice(0, -2);
                    document.getElementById('order-input').value = orderNo;
                    fetchOrderInfo(orderNo);
                } else {
                    document.getElementById('order-input').value = text;
                    fetchOrderInfo(text);
                }
            }
        }

        // GASへ通信して指示情報を1件取得
        function fetchOrderInfo(orderNo) {
            fetch(`${API_URL}?action=getOne&orderNo=${orderNo}`)
                .then(res => res.json())
                .then(res => {
                    if (res.status === "success") {
                        showToast("✔ 指示情報を照合しました");
                    } else {
                        showToast("⚠ 指示書にない新規の発注番号です");
                    }
                })
                .catch(err => console.error(err));
        }

        // GASへ日報データを送信してスプレッドシートへ保存
        function sendNippo() {
            const barcode = document.getElementById('barcode-input').value;
            const orderNo = document.getElementById('order-input').value;
            
            if(!barcode) {
                showToast("データが空欄です");
                return;
            }

            const payload = {
                action: "save",
                data: {
                    barcode: barcode,
                    orderNo: orderNo,
                    lotNo: barcode.startsWith("L") ? barcode : ""
                }
            };

            showToast("送信中...");
            fetch(API_URL, {
                method: "POST",
                mode: "no-cors", // クロスドメイン制限を回避する設定
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(() => {
                showToast("✅ 日報を送信・保存しました！");
                document.getElementById('barcode-input').value = "";
            })
            .catch(err => {
                console.error(err);
                showToast("❌ 送信に失敗しました");
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }
    </script>
</body>
</html>
