<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏭 SPG作業日報アプリ</title>
    <style>
        :root { --primary: #0056b3; --success: #28a745; --danger: #dc3545; --bg: #f4f7f6; }
        body { font-family: 'Meiryo', sans-serif; margin: 0; padding: 12px; background-color: var(--bg); color: #333; }
        .card { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 14px; border: 1px solid #e1e8ed; }
        h2 { margin-top: 0; color: var(--primary); font-size: 16px; border-bottom: 3px solid var(--primary); padding-bottom: 6px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-top: 12px; margin-bottom: 4px; color: #495057; }
        .btn { display: block; width: 100%; padding: 14px; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; text-align: center; cursor: pointer; box-sizing: border-box; }
        .btn-scan { background: var(--primary); }
        .btn-start { background: var(--success); }
        .btn-end { background: var(--danger); }
        .btn:disabled { background: #bdc3c7 !important; color: #7f8c8d !important; opacity: 0.6; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 12px; font-size: 16px; font-weight: bold; border: 2px solid #ced4da; border-radius: 6px; box-sizing: border-box; }
        .auto-field { background: #e9ecef !important; text-align: center; }
        .manual-input { background: #ffffff !important; border: 2px solid var(--primary) !important; text-align: center; }
        .flex-container { display: flex; gap: 12px; margin-top: 16px; }
        .toast { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: #fff; padding: 14px 24px; border-radius: 25px; font-size: 15px; font-weight: bold; z-index: 10000; display: none; text-align: center; width: 75%; }
        .toast.show { display: block; }
    </style>
</head>
<body>

    <div class="card">
        <h2>📷 加工指図書バーコードスキャン</h2>
        <button class="btn btn-scan" id="scan-btn">カメラを起動してスキャン</button>
    </div>

    <div class="card">
        <h2>📝 日報入力内容</h2>
        
        <label>発注No:</label>
        <input type="text" id="order-input" class="manual-input" placeholder="6桁の数字を入力" oninput="triggerInstantSearch()">
        
        <label>日付:</label>
        <input type="text" id="date-input" class="auto-field" readonly>
        
        <label>商品名:</label>
        <input type="text" id="name-input" class="auto-field" readonly placeholder="---">
        
        <label>数量:</label>
        <input type="text" id="qty-input" class="auto-field" readonly placeholder="---">
        
        <hr style="border: 0; border-top: 1px solid #dee2e6; margin: 20px 0;">

        <label>生産ライン:</label>
        <select id="line-select">
            <option value="Aライン">ライン A</option>
            <option value="Bライン">ライン B</option>
        </select>
        
        <label>作業人数 (名):</label>
        <input type="number" id="workers-input" value="1" min="1">
        
        <div class="flex-container">
            <button class="btn btn-start" id="start-btn" disabled>▶ 「開始」ボタン</button>
            <button class="btn btn-end" id="end-btn" disabled>■ 「完了」ボタン</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ⚠️【最重要】この下の "" の中に、さきほど手順1の最後で生成した「最新のウェブアプリURL」を上書き貼り付けしてください！
        const API_URL = "ここにURL";
        
        window.addEventListener('load', () => {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('date-input').value = `${yyyy}/${mm}/${dd}`;
        });

        let searchTimeout = null;
        function triggerInstantSearch() {
            const orderVal = document.getElementById('order-input').value.trim();
            if (!orderVal) {
                document.getElementById('name-input').value = "---";
                document.getElementById('qty-input').value = "---";
                return;
            }

            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                let cleanVal = orderVal.toUpperCase().replace(/^S/, "");
                let core6Digit = cleanVal.substring(0, 6);
                
                if (core6Digit.length >= 6) {
                    document.getElementById('order-input').value = core6Digit;
                    fetchOrderInfo(core6Digit);
                }
            }, 400); 
        }

        function fetchOrderInfo(orderNo) {
            const toast = document.getElementById('toast');
            toast.textContent = "指図残シートから情報を照合中...";
            toast.classList.add('show');

            fetch(`${API_URL}?action=getOne&orderNo=${orderNo}`)
                .then(res => res.json())
                .then(res => {
                    toast.classList.remove('show');
                    if (res.status === "success" && res.order) {
                        document.getElementById('name-input').value = res.order.name;
                        document.getElementById('qty-input').value = res.order.qty;
                        document.getElementById('start-btn').disabled = false;
                    } else {
                        document.getElementById('name-input').value = "不一致エラー";
                        document.getElementById('qty-input').value = "---";
                    }
                })
                .catch(err => {
                    toast.textContent = "❌ データの取得に失敗しました。";
                    document.getElementById('name-input').value = "不一致エラー";
                });
        }
    </script>
</body>
</html>
